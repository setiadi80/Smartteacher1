<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATP - SmartTeacher</title>

<!-- JSPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
:root{
  --hitam:#000;
  --putih:#fff;
  --biru:#1565c0;
  --emas:#d4af37;
  --hijau:#0f0;
}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--hitam);
  color:var(--putih);
}
.header-utama{
  background:var(--hitam);
  padding:10px;
  text-align:center;
  border-bottom:2px solid var(--emas);
}
.header-utama h1{
  margin:0;
  color:var(--emas);
  font-size:18px;
}
.header-utama #heloUser{
  font-size:14px;
  color:#00ffdd;
  margin-top:2px;
}
.status-bar{
  font-size:12px;
  margin-top:2px;
}
.status-online{
  font-weight:bold;
  color:var(--hijau);
}
.container{ 
  padding:10px; 
  display:flex; 
  flex-direction:column; 
  gap:8px; 
  margin-bottom:100px; /* space tombol sticky di bawah */
}
.row{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.row input,.row select{ flex:1; padding:6px; background:#111; color:var(--putih); border:1px solid var(--emas); border-radius:4px; font-size:12px; }

/* Textarea */
textarea{ width:100%; padding:6px; background:#111; color:var(--putih); border:1px solid var(--emas); border-radius:4px; min-height:40px; resize:none; font-size:12px; }

/* Card */
.card{ background:#111; border:1px solid var(--emas); padding:6px; border-radius:6px; display:flex; flex-wrap:wrap; gap:4px; align-items:flex-start; }

/* Tombol Sticky di atas footer */
.btn-row-sticky{
  display:flex;
  flex-wrap:nowrap;
  gap:4px;
  padding:6px 8px;
  justify-content:center;
  position:fixed;
  bottom:25px; /* di atas footer */
  width:100%;
  background:#111; 
  border-top:2px solid var(--emas);
  z-index:1000;
  overflow-x:auto;
}
.btn-row-sticky button{
  flex:none;
  padding:5px 8px;
  font-size:11px;
  border-radius:4px;
  cursor:pointer;
  border:none;
  background:var(--biru);
  color:var(--putih);
  white-space:nowrap;
}
.btn-row-sticky .btn-emas{background:var(--emas); color:#000;}

/* Footer */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  padding:4px;
  text-align:center;
  font-size:11px;
  color:var(--putih);
  border-top:1px solid var(--emas);
}

/* Toast */
.toast{ position:fixed; bottom:55px; left:50%; transform:translateX(-50%); background:var(--biru); color:#fff; padding:8px 14px; border-radius:6px; font-size:12px; opacity:0; transition:0.3s; z-index:999; }
.toast.show{ opacity:1; }

@media screen and (max-width:600px){
  .row{flex-direction:row; flex-wrap:wrap;}
  .row input,.row select{flex:1 1 45%;}
  .btn-row-sticky{flex-wrap:nowrap;}
}
</style>
</head>
<body>

<header class="header-utama">
  <h1>SmartTeacher - Alur Tujuan Pembelajaran</h1>
  <div id="heloUser">Helo: Admin</div>
  <div class="status-bar">
    <span id="statusOnline" class="status-online">●</span>
    <span id="statusText">Online</span> |
    <span id="tanggalHariIni">...</span> |
    <span id="jam">...</span>
  </div>
</header>

<div class="container">

  <!-- Row Mapel & Kelas -->
  <div class="row">
    <select id="mapel"><option value="">Pilih Mapel</option></select>
    <select id="kelas"><option value="">Pilih Kelas</option></select>
  </div>

  <!-- Row Tanggal -->
  <div class="row">
    <input type="date" id="tglMulai">
    <input type="date" id="tglSelesai">
  </div>

  <!-- Alur -->
  <textarea id="alur" placeholder="Tulis Alur Tujuan Pembelajaran di sini..."></textarea>

  <!-- Row Filter Mapel & Kelas -->
  <div class="row">
    <select id="filterMapel" onchange="tampilData()"><option value="">Filter Mapel</option></select>
    <select id="filterKelas" onchange="tampilData()"><option value="">Filter Kelas</option></select>
  </div>

  <!-- Preview Data -->
  <div id="dataList"></div>
</div>

<!-- Tombol Sticky di atas footer -->
<div class="btn-row-sticky">
  <button onclick="btnSimpan()">Simpan</button>
  <button onclick="btnBackup()">Backup</button>
  <button onclick="btnRestore()">Restore</button>
  <button onclick="btnReset()">Reset</button>
  <button class="btn-emas" onclick="btnExportPDF()">Ex PDF</button>
  <button onclick="btnKembali()">Kembali</button>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Footer paling bawah -->
<footer>SmartTeacher by tsetiadi</footer>

<script>
// ===== Nama User & Status =====
const biodata = JSON.parse(localStorage.getItem("biodataGuru")) || {};
const guruNama = biodata.guru?.nama || "Admin";
document.getElementById("heloUser").innerText = "Helo: "+guruNama;

function updateJam(){
  const now=new Date();
  document.getElementById("tanggalHariIni").innerText = now.toLocaleDateString("id-ID",{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById("jam").innerText = now.toLocaleTimeString("id-ID");
}
setInterval(updateJam,1000); updateJam();

// ===== Status Online =====
function updateStatus(){
  const el=document.getElementById("statusOnline");
  const txt=document.getElementById("statusText");
  if(navigator.onLine){ el.style.color="lime"; txt.innerText="Online"; }
  else{ el.style.color="red"; txt.innerText="Offline"; }
}
setInterval(updateStatus,5000); updateStatus();

// ===== Toast =====
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// ===== Load Dropdown Mata Pelajaran & Kelas =====
function loadDropdowns(){
  const mapelList = JSON.parse(localStorage.getItem("dataMapel"))||[];
  const kelasList = JSON.parse(localStorage.getItem("dataKelas"))||["1","2","3","4","5","6"];
  ["mapel","filterMapel"].forEach(id=>{
    const sel=document.getElementById(id); sel.innerHTML='<option value="">Pilih Mapel</option>';
    mapelList.forEach(m=>{ const o=document.createElement("option"); o.value=m; o.textContent=m; sel.appendChild(o); });
  });
  ["kelas","filterKelas"].forEach(id=>{
    const sel=document.getElementById(id); sel.innerHTML='<option value="">Pilih Kelas</option>';
    kelasList.forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent=k; sel.appendChild(o); });
  });
}
loadDropdowns();

// ===== Data ATP =====
let dataATP = JSON.parse(localStorage.getItem("dataATP"))||[];

// ===== Tombol Fungsi dengan Toast =====
function btnSimpan(){ simpan(); showToast("Data disimpan"); }
function btnBackup(){ backup(); showToast("Backup berhasil"); }
function btnRestore(){ restore(); showToast("Restore berhasil"); }
function btnReset(){ resetForm(); showToast("Form di-reset"); }
function btnExportPDF(){ exportPDF(); }
function btnKembali(){ showToast("Kembali"); setTimeout(()=>window.history.back(),200); }

// ===== Simpan Data =====
function simpan(){
  if(!mapel.value||!kelas.value||!tglMulai.value||!tglSelesai.value||!alur.value){ showToast("Lengkapi semua field!"); return; }
  if(tglMulai.value>tglSelesai.value){ showToast("Periode tidak valid!"); return; }
  dataATP.push({mapel:mapel.value,kelas:kelas.value,t1:tglMulai.value,t2:tglSelesai.value,alur:alur.value});
  localStorage.setItem("dataATP",JSON.stringify(dataATP));
  tampilData(); resetForm();
}

// ===== Preview / Filter =====
function tampilData(){
  dataList.innerHTML="";
  const fMapel = filterMapel.value;
  const fKelas = filterKelas.value;
  dataATP.forEach((d,i)=>{
    if((!fMapel||d.mapel===fMapel)&&(!fKelas||d.kelas===fKelas)){
      const div = document.createElement("div"); 
      div.className="card";
      div.innerHTML=`<p><b>${d.mapel}</b></p><p><b>${d.kelas}</b></p><p>${d.t1} s/d ${d.t2}</p><p>${d.alur}</p>`;
      let timer=null, longPress=false;
      const start=()=>{longPress=false; timer=setTimeout(()=>{longPress=true; if(confirm("Hapus data ini?")){dataATP.splice(i,1); localStorage.setItem("dataATP",JSON.stringify(dataATP)); tampilData(); showToast("Data dihapus");}},800);}
      const cancel=()=>{clearTimeout(timer);}
      div.addEventListener("mousedown",start); div.addEventListener("touchstart",start);
      div.addEventListener("mouseup",cancel); div.addEventListener("mouseleave",cancel); div.addEventListener("touchend",cancel);
      div.addEventListener("click",()=>{if(longPress) return; mapel.value=d.mapel; kelas.value=d.kelas; tglMulai.value=d.t1; tglSelesai.value=d.t2; alur.value=d.alur; showToast("Mode edit");});
      dataList.appendChild(div);
    }
  });
}

// ===== Reset Form =====
function resetForm(){ mapel.value=""; kelas.value=""; tglMulai.value=""; tglSelesai.value=""; alur.value=""; }

// ===== Backup / Restore =====
function backup(){ localStorage.setItem("backupATP",JSON.stringify(dataATP)); }
function restore(){ const b=localStorage.getItem("backupATP"); if(b){ dataATP=JSON.parse(b); tampilData(); } }

// ===== Export PDF =====
function exportPDF(){
  const fMapel = filterMapel.value;
  const fKelas = filterKelas.value;
  const filtered = dataATP.filter(d=>(!fMapel||d.mapel===fMapel)&&(!fKelas||d.kelas===fKelas));
  if(filtered.length===0){showToast("Tidak ada data untuk export"); return;}
  const {jsPDF}=window.jspdf; const doc=new jsPDF();
  doc.setFontSize(16); doc.text("ALUR TUJUAN PEMBELAJARAN",105,15,{align:"center"});
  doc.setFontSize(11); doc.text("Guru: "+guruNama,14,25); doc.text("Tanggal Export: "+new Date().toLocaleString("id-ID"),14,32);
  let rows=[]; filtered.forEach((d,i)=>rows.push([i+1,d.mapel,d.kelas,d.t1+" s/d "+d.t2,d.alur]));
  doc.autoTable({startY:40,head:[["No","Mapel","Kelas","Periode","Alur"]],body:rows,theme:"grid"});
  doc.save("atp-smartteacher.pdf"); showToast("PDF berhasil dibuat");
}

tampilData();
</script>
</body>
</html>
