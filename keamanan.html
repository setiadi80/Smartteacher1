<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>keamanan</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
}

header{
    background:#000;
    padding:15px;
    text-align:center;
    font-weight:bold;
    border-bottom:2px solid gold;
}

.container{
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:20px;
}

td{
    padding:10px;
}

input{
    width:100%;
    padding:8px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px;
    width:100%;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.btn-ganti{
    background:#00bcd4;
}

.btn-reset{
    background:gold;
    color:black;
}

#infoKeamanan{
    margin-top:15px;
    font-size:14px;
}
</style>

</head>
<body>

<header>KEAMANAN AKUN</header>

<div class="container">

<h3>Ganti Password</h3>

<table border="1">
<tr>
<td>Password Lama</td>
<td><input type="password" id="oldPass"></td>
</tr>
<tr>
<td>Password Baru</td>
<td><input type="password" id="newPass"></td>
</tr>
<tr>
<td colspan="2">
<button class="btn-ganti" onclick="prosesGanti()">GANTI PASSWORD</button>
</td>
</tr>
</table>

<h3>Reset Password</h3>

<table border="1">
<tr>
<td>Recovery Code</td>
<td><input type="text" id="recoveryInput"></td>
</tr>
<tr>
<td colspan="2">
<button class="btn-reset" onclick="prosesReset()">RESET PASSWORD</button>
</td>
</tr>
</table>

<p id="infoKeamanan"></p>

<button onclick="window.location.href='index.html'">KEMBALI</button>

</div>

<script src="auth.js"></script>

<script>

async function prosesGanti(){
    const oldPass = document.getElementById("oldPass").value.trim();
    const newPass = document.getElementById("newPass").value.trim();
    const result = await changePassword(oldPass,newPass);
    document.getElementById("infoKeamanan").innerText = result;
}

async function prosesReset(){
    const code = document.getElementById("recoveryInput").value.trim();
    const result = await resetPassword(code);
    document.getElementById("infoKeamanan").innerText = result;
}

</script>

</body>
</html>
