<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPP - SmartTeacher</title>

<!-- JSPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
:root{
  --hitam:#000;
  --putih:#fff;
  --biru:#1565c0;
  --emas:#d4af37;
  --hijau:#0f0;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--hitam);
  color:var(--putih);
}
.header-utama{
  background:var(--hitam);
  padding:10px;
  text-align:center;
  border-bottom:2px solid var(--emas);
}
.header-utama h1{margin:0;color:var(--emas);font-size:18px;}
.header-utama #heloUser{font-size:14px;color:#00ffdd;margin-top:2px;}
.status-bar{font-size:12px;margin-top:2px;}
.status-online{font-weight:bold;color:var(--hijau);}
.container{padding:10px;display:flex;flex-direction:column;gap:10px;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.row input,.row select{flex:1;padding:6px;background:#111;color:var(--putih);border:1px solid var(--emas);border-radius:4px;font-size:13px;}
textarea{width:100%;padding:6px;background:#111;color:var(--putih);border:1px solid var(--emas);border-radius:4px;min-height:40px;resize:none;font-size:13px;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
button{flex:1;padding:6px;font-size:12px;border:none;border-radius:4px;cursor:pointer;background:var(--biru);color:var(--putih);}
.btn-emas{background:var(--emas);color:var(--hitam);}
.preview-container{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
#previewTable{width:100%;display:block;max-height:300px;overflow-y:auto;margin-top:10px;border:1px solid var(--emas);border-radius:6px;}
#totalRPP{text-align:right;font-size:13px;margin-top:5px;}
footer{padding:10px;text-align:center;border-top:2px solid var(--emas);font-size:12px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--biru);color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:0.3s;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header class="header-utama">
  <h1>SmartTeacher - RPP</h1>
  <div id="heloUser">Helo: Admin</div>
  <div class="status-bar">
    <span id="statusOnline" class="status-online">●</span>
    <span id="statusText">Online</span> |
    <span id="tanggalHariIni">...</span> |
    <span id="jam">...</span>
  </div>
</header>

<div class="container">
  <!-- Input RPP -->
  <div class="row">
    <select id="mapel"><option value="">Pilih Mata Pelajaran</option></select>
    <select id="kelas">
      <option value="">Pilih Kelas</option>
      <option>1</option><option>2</option><option>3</option>
      <option>4</option><option>5</option><option>6</option>
    </select>
    <input type="date" id="tglRPP" placeholder="Tanggal">
    <input type="number" id="jmlJam" placeholder="Jumlah Jam" min="1">
  </div>

  <textarea id="tujuan" placeholder="Tujuan Pembelajaran"></textarea>

  <div class="btn-row">
    <button onclick="simpanRPP()">Simpan</button>
    <button onclick="backupRPP()">Backup</button>
    <button onclick="restoreRPP()">Restore</button>
    <button onclick="resetForm()">Reset</button>
    <button class="btn-emas" onclick="exportPDF()">Ex PDF</button>
    <button onclick="window.history.back()">Kembali</button>
  </div>

  <!-- Filter & Preview -->
  <div class="preview-container">
    <div class="row">
      <select id="filterMapel" onchange="tampilRPP()"><option value="">Filter Mapel</option></select>
      <select id="filterKelas" onchange="tampilRPP()">
        <option value="">Filter Kelas</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
      </select>
    </div>
    <div id="previewTable"></div>
    <div id="totalRPP"></div>
  </div>
</div>

<footer>SmartTeacher by tsetiadi</footer>
<div id="toast" class="toast"></div>

<script>
// ===== Nama User & Aplikasi =====
const biodataGuru = JSON.parse(localStorage.getItem("biodataGuru"))||{};
const guruNama = biodataGuru.guru?.nama||"Admin";
document.getElementById("heloUser").innerText = "Helo: "+guruNama;

// ===== Realtime Tanggal & Jam =====
function updateJam(){
  const now=new Date();
  document.getElementById("tanggalHariIni").innerText=now.toLocaleDateString("id-ID",{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById("jam").innerText=now.toLocaleTimeString("id-ID");
}
setInterval(updateJam,1000); updateJam();

// ===== Status Online / Offline =====
function updateStatus(){
  const el=document.getElementById("statusOnline");
  const txt=document.getElementById("statusText");
  if(navigator.onLine){el.style.color="lime"; txt.innerText="Online";}
  else{el.style.color="red"; txt.innerText="Offline";}
}
setInterval(updateStatus,5000); updateStatus();

// ===== Toast =====
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// ===== Data RPP =====
let dataRPP = JSON.parse(localStorage.getItem("dataRPP"))||[];

// ===== Ambil Mata Pelajaran =====
const daftarMapel = JSON.parse(localStorage.getItem("mataPelajaran"))||[];
const mapelSelect = document.getElementById("mapel");
const filterMapel = document.getElementById("filterMapel");
daftarMapel.forEach(m=>{
  const opt1=document.createElement("option");
  opt1.value=m; opt1.text=m; mapelSelect.appendChild(opt1);
  const opt2=document.createElement("option");
  opt2.value=m; opt2.text=m; filterMapel.appendChild(opt2);
});

// ===== Simpan RPP =====
function simpanRPP(){
  const mapel=mapelSelect.value.trim();
  const kelas=document.getElementById("kelas").value.trim();
  const tgl=document.getElementById("tglRPP").value;
  const jmlJam=document.getElementById("jmlJam").value.trim();
  const tujuan=document.getElementById("tujuan").value.trim();
  if(!mapel||!kelas||!tgl||!jmlJam||!tujuan){showToast("Lengkapi semua field!"); return;}
  
  dataRPP.push({mapel,kelas,tanggal:tgl,jmlJam:Number(jmlJam),tujuan});
  localStorage.setItem("dataRPP",JSON.stringify(dataRPP));
  resetForm(); tampilRPP();
  showToast("Data RPP tersimpan");
}

// ===== Reset Form =====
function resetForm(){
  mapelSelect.value=""; document.getElementById("kelas").value="";
  document.getElementById("tglRPP").value="";
  document.getElementById("jmlJam").value="";
  document.getElementById("tujuan").value="";
}

// ===== Backup / Restore =====
function backupRPP(){localStorage.setItem("backupRPP",JSON.stringify(dataRPP)); showToast("Backup berhasil");}
function restoreRPP(){const b=localStorage.getItem("backupRPP"); if(b){dataRPP=JSON.parse(b); localStorage.setItem("dataRPP",b); tampilRPP(); showToast("Restore berhasil");}}

// ===== Preview & Total =====
function tampilRPP(){
  const fMapel = filterMapel.value;
  const fKelas = document.getElementById("filterKelas").value;
  let html=`<table border="1" cellspacing="0" cellpadding="4"><tr><th>Mapel</th><th>Kelas</th><th>Tanggal</th><th>Jam</th><th>Tujuan</th></tr>`;
  let totalJam=0;
  let list=dataRPP.filter(d=>(!fMapel||d.mapel===fMapel)&&(!fKelas||d.kelas===fKelas));
  list.forEach(d=>{
    html+=`<tr><td>${d.mapel}</td><td>${d.kelas}</td><td>${d.tanggal}</td><td>${d.jmlJam}</td><td>${d.tujuan}</td></tr>`;
    totalJam+=d.jmlJam;
  });
  html+="</table>";
  document.getElementById("previewTable").innerHTML=html;
  document.getElementById("totalRPP").innerText=`Total RPP: ${list.length} | Total Jam: ${totalJam}`;
}

// ===== Export PDF =====
function exportPDF(){
  let fMapel = filterMapel.value;
  let fKelas = document.getElementById("filterKelas").value;
  let list=dataRPP.filter(d=>(!fMapel||d.mapel===fMapel)&&(!fKelas||d.kelas===fKelas));
  if(list.length===0){showToast("Tidak ada data untuk export"); return;}
  const {jsPDF}=window.jspdf; const doc=new jsPDF();
  doc.setFontSize(16); doc.text("RPP SmartTeacher",105,15,{align:"center"});
  doc.setFontSize(11); doc.text("Guru: "+guruNama,14,25);
  doc.text("Tanggal Export: "+new Date().toLocaleString("id-ID"),14,32);
  const rows=list.map((d,i)=>[i+1,d.mapel,d.kelas,d.tanggal,d.jmlJam,d.tujuan]);
  doc.autoTable({startY:40,head:[["No","Mapel","Kelas","Tanggal","Jam","Tujuan"]],body:rows,theme:"grid"});
  doc.save("rpp-smartteacher.pdf");
  showToast("PDF berhasil dibuat");
}

// ===== Inisialisasi =====
tampilRPP();
</script>
</body>
</html>
