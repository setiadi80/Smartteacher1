<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>login</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#1e1e1e;
    padding:30px;
    border-radius:10px;
    width:90%;
    max-width:350px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    color:white;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:10px;
    background:#00bcd4;
    border:none;
    border-radius:5px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0097a7;
}

.link-btn{
    background:none;
    color:#00bcd4;
    border:none;
    margin-top:10px;
    cursor:pointer;
}

#infoLogin{
    margin-top:10px;
    font-size:14px;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>LOGIN GURU</h2>

    <div>Username: <span id="userNama">Admin</span></div>

    <input type="password" id="password" placeholder="Masukkan Password">
    <button onclick="login()">LOGIN</button>

    <button class="link-btn" onclick="toggleRecovery()">Lupa Password?</button>

    <div id="recoveryBox" style="display:none;">
        <input type="text" id="recoveryCode" placeholder="Masukkan Recovery Code">
        <button onclick="doReset()">Reset Password</button>
    </div>

    <p id="infoLogin"></p>
</div>

<script src="auth.js"></script>

<script>
let biodata;
try{
    biodata = JSON.parse(localStorage.getItem("biodataGuru"));
}catch(e){
    localStorage.removeItem("biodataGuru");
    biodata = null;
}

if(biodata && biodata.guru && biodata.guru.nama){
    document.getElementById("userNama").innerText = biodata.guru.nama;
}

function toggleRecovery(){
    const box = document.getElementById("recoveryBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

async function doReset(){
    const code = document.getElementById("recoveryCode").value.trim();
    const result = await resetPassword(code);
    const info = document.getElementById("infoLogin");
    info.innerText = result;
}
</script>

</body>
</html>
