<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTeacher - Kalender Akademik</title><!-- JSPDF --><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script><style>
:root{
  --hitam:#000;
  --putih:#fff;
  --biru:#1565c0;
  --emas:#d4af37;
  --hijau:#0f0;
}
body{margin:0;font-family:Arial,sans-serif;background:var(--hitam);color:var(--putih);}
.header-utama{background:var(--hitam); padding:10px; text-align:center; border-bottom:2px solid var(--emas);}
.header-utama h1{margin:0;color:var(--emas);font-size:18px;}
.header-utama #heloUser{font-size:14px;color:#00ffdd;margin-top:2px;}
.status-bar{font-size:12px;margin-top:2px;}
.status-online{color:var(--hijau);font-weight:bold;}
.container{padding:10px; display:flex; flex-direction:column; gap:8px;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.row select,input{flex:1;padding:6px;background:#111;color:var(--putih);border:1px solid var(--emas);border-radius:4px;font-size:13px;}
textarea{width:100%;padding:6px;background:#111;color:var(--putih);border:1px solid var(--emas);border-radius:4px;resize:none;min-height:60px;font-size:13px;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}
button{flex:1;padding:6px;font-size:12px;border:none;border-radius:4px;cursor:pointer;background:var(--biru);color:var(--putih);}
.btn-emas{background:var(--emas);color:var(--hitam);}
.card{background:#111;border:1px solid var(--emas);padding:8px;border-radius:6px;position:relative;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--biru);color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;opacity:0;transition:0.3s;z-index:999;}
.toast.show{opacity:1;}
footer{padding:10px;text-align:center;border-top:2px solid var(--emas);}
footer button{max-width:150px;}
</style></head>
<body><header class="header-utama">
  <h1>SmartTeacher - Kalender Akademik</h1>
  <div id="heloUser">Helo: Admin</div>
  <div class="status-bar">
    <span id="statusOnline" class="status-online">●</span>
    <span id="statusText">Online</span> |
    <span id="tanggalHariIni">...</span> |
    <span id="jam">...</span>
  </div>
</header><div class="container">  <!-- Input Kalender -->  <div class="row">
    <select id="semesterSelect"><option value="">-- Pilih Semester --</option><option value="1">1</option><option value="2">2</option></select>
    <select id="bulanSelect"><option value="">-- Pilih Bulan --</option></select>
    <select id="jenisKegiatan"><option value="">-- Pilih Jenis Kegiatan --</option>
      <option value="Libur">Libur</option>
      <option value="PTS">PTS</option>
      <option value="UAS">UAS</option>
      <option value="Ekstra">Ekstrakurikuler</option>
      <option value="Lainnya">Lainnya</option>
    </select>
  </div>
  <div class="row">
    <input type="date" id="tglDari">
    <input type="date" id="tglSampai">
  </div>
  <textarea id="keterangan" placeholder="Keterangan kegiatan..."></textarea>
  <div class="btn-row">
    <button onclick="simpanKalender()">Simpan</button>
    <button onclick="backupKalender()">Backup</button>
    <button onclick="restoreKalender()">Restore</button>
    <button onclick="resetForm()">Reset</button>
    <button class="btn-emas" onclick="exportPDF()">Ex PDF</button>
  </div>  <!-- Filter -->  <div class="row">
    <select id="filterSemester" onchange="tampilData()"><option value="">Filter Semester</option><option value="1">1</option><option value="2">2</option></select>
    <select id="filterBulan" onchange="tampilData()"><option value="">Filter Bulan</option></select>
    <select id="filterJenis" onchange="tampilData()"><option value="">Filter Jenis</option><option value="Libur">Libur</option><option value="PTS">PTS</option><option value="UAS">UAS</option><option value="Ekstra">Ekstrakurikuler</option><option value="Lainnya">Lainnya</option></select>
  </div>  <div id="dataList"></div>
</div><footer>
  <button onclick="window.history.back()">Kembali</button>
</footer>
<div id="toast" class="toast"></div><script>
// ===== Header & Status =====
const biodataGuru = JSON.parse(localStorage.getItem("biodataGuru"))||{};
const guruNama = biodataGuru.guru?.nama||"Admin";
document.getElementById("heloUser").innerText = "Helo: "+guruNama;

function updateJam(){
  const now=new Date();
  document.getElementById("tanggalHariIni").innerText = now.toLocaleDateString("id-ID",{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById("jam").innerText = now.toLocaleTimeString("id-ID");
}
setInterval(updateJam,1000); updateJam();

function updateStatus(){
  const el=document.getElementById("statusOnline"), txt=document.getElementById("statusText");
  if(navigator.onLine){el.style.color="lime"; txt.innerText="Online";} else{el.style.color="red"; txt.innerText="Offline";}
}
setInterval(updateStatus,5000); updateStatus();

function showToast(msg){ const t=document.getElementById("toast"); t.innerText=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }

// ===== Bulan =====
const bulanList=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const bulanSelect=document.getElementById("bulanSelect"), filterBulan=document.getElementById("filterBulan");
bulanList.forEach((b,i)=>{let opt1=document.createElement("option"), opt2=document.createElement("option"); opt1.value=i+1; opt1.text=b; opt2.value=i+1; opt2.text=b; bulanSelect.appendChild(opt1); filterBulan.appendChild(opt2);});

// ===== Data Kalender =====
let dataKalender = JSON.parse(localStorage.getItem("dataKalender"))||[];

// ===== Simpan =====
function simpanKalender(){
  const semester=document.getElementById("semesterSelect").value;
  const bulan=document.getElementById("bulanSelect").value;
  const jenis=document.getElementById("jenisKegiatan").value;
  const tglD=document.getElementById("tglDari").value;
  const tglS=document.getElementById("tglSampai").value;
  const ket=document.getElementById("keterangan").value;
  if(!semester||!bulan||!jenis||!tglD||!tglS||!ket){showToast("Lengkapi semua field!"); return;}
  if(tglD>tglS){showToast("Periode tidak valid!"); return;}
  dataKalender.push({id:Date.now(),semester,bulan,jenis,tglD,tglS,ket});
  localStorage.setItem("dataKalender",JSON.stringify(dataKalender));
  resetForm(); tampilData(); showToast("Data tersimpan");
}

// ===== Tampil Data =====
function tampilData(){
  const fs=document.getElementById("filterSemester").value;
  const fb=document.getElementById("filterBulan").value;
  const fj=document.getElementById("filterJenis").value;
  dataList.innerHTML="";
  const filtered=dataKalender.filter(d=>(!fs||d.semester===fs)&&(!fb||d.bulan===fb)&&(!fj||d.jenis===fj));
  filtered.forEach((d,i)=>{
    const div=document.createElement("div"); div.className="card";
    div.innerHTML=`<b>Semester ${d.semester} | ${bulanList[d.bulan-1]} | ${d.jenis}</b><br>Periode: ${d.tglD} s/d ${d.tglS}<br>${d.ket}`;
    let timer=null,longPress=false;
    const start=()=>{longPress=false; timer=setTimeout(()=>{longPress=true; if(confirm("Hapus data ini?")){dataKalender.splice(i,1); localStorage.setItem("dataKalender",JSON.stringify(dataKalender)); tampilData(); showToast("Data dihapus");}},800);};
    const cancel=()=>{clearTimeout(timer);};
    div.addEventListener("mousedown",start); div.addEventListener("touchstart",start);
    div.addEventListener("mouseup",cancel); div.addEventListener("mouseleave",cancel); div.addEventListener("touchend",cancel);
    div.addEventListener("click",()=>{if(longPress) return;
      document.getElementById("semesterSelect").value=d.semester;
      document.getElementById("bulanSelect").value=d.bulan;
      document.getElementById("jenisKegiatan").value=d.jenis;
      document.getElementById("tglDari").value=d.tglD;
      document.getElementById("tglSampai").value=d.tglS;
      document.getElementById("keterangan").value=d.ket;
      showToast("Mode edit");
    });
    dataList.appendChild(div);
  });
}

// ===== Reset Form =====
function resetForm(){
  document.getElementById("semesterSelect").value="";
  document.getElementById("bulanSelect").value="";
  document.getElementById("jenisKegiatan").value="";
  document.getElementById("tglDari").value="";
  document.getElementById("tglSampai").value="";
  document.getElementById("keterangan").value="";
}

// ===== Backup / Restore =====
function backupKalender(){localStorage.setItem("backupKalender",JSON.stringify(dataKalender)); showToast("Backup berhasil");}
function restoreKalender(){const b=localStorage.getItem("backupKalender"); if(b){dataKalender=JSON.parse(b); localStorage.setItem("dataKalender",b); tampilData(); showToast("Restore berhasil");}}

// ===== Export PDF =====
function exportPDF(){
  if(dataKalender.length===0){showToast("Tidak ada data untuk export"); return;}
  const {jsPDF}=window.jspdf; const doc=new jsPDF();
  doc.setFontSize(16); doc.text("Kalender Akademik",105,15,{align:"center"});
  doc.setFontSize(11); doc.text("Guru: "+guruNama,14,25);
  doc.text("Tanggal Export: "+new Date().toLocaleString("id-ID"),14,32);
  let rows=[];
  dataKalender.forEach((d,i)=>{rows.push([i+1,"Semester "+d.semester,bulanList[d.bulan-1],d.jenis,d.tglD+" s/d "+d.tglS,d.ket]);});
  doc.autoTable({startY:40,head:[["No","Semester","Bulan","Jenis","Periode","Keterangan"]],body:rows,theme:"grid"});
  doc.save("kalender-akademik.pdf"); showToast("PDF berhasil dibuat");
}

// ===== Inisialisasi =====
tampilData();
</script></body>
</html>
